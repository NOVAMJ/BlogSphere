databases:
  - name: blogsphere-db
    databaseName: blogsphere
    user: blogsphere

services:
  - type: web
    name: blogsphere
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT blog_main.wsgi:application"
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: blogsphere-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
