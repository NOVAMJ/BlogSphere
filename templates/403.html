{% extends 'base.html' %}
{% block content %}
<section class="error-page">
  <div class="error-page__code">403</div>
  <h1 class="error-page__title">Too many attempts.</h1>
  <p class="error-page__lede">You've made too many failed login attempts. Please wait 5 minutes and try again.</p>
  <div class="error-page__actions">
    <a href="/" class="btn btn-warning">Back to homepage</a>
    <a href="{% url 'login' %}" class="btn btn-outline-secondary">Try logging in again</a>
  </div>
</section>
{% endblock %}
