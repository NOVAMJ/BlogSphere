{% extends 'base.html' %}

{% block content %}
<div style="max-width:480px;margin:48px auto;text-align:center;">
  <div class="sidebar-card p-4 rounded">
    <div style="font-size:3rem;margin-bottom:12px;">✅</div>
    <h3 style="font-weight:800;margin-bottom:8px;">Password updated!</h3>
    <p class="text-muted" style="font-size:0.95rem;line-height:1.6;">
      Your password has been changed successfully. You can now log in with your new password.
    </p>
    <a href="{% url 'login' %}" class="btn btn-warning btn-block mt-4" style="font-weight:700;">
      Log in
    </a>
  </div>
</div>
{% endblock %}
