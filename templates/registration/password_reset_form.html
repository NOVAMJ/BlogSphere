{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div style="max-width:480px;margin:48px auto;">
  <div class="sidebar-card p-4 rounded">
    <h3 class="mb-1" style="font-weight:800;">Reset your password</h3>
    <p class="text-muted mb-4" style="font-size:0.95rem;">
      Enter the email address linked to your account and we'll send you a reset link.
    </p>
    <form method="POST">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-warning btn-block mt-2" style="font-weight:700;">
        Send reset link
      </button>
    </form>
    <div class="text-center mt-3">
      <a href="{% url 'login' %}" class="text-muted" style="font-size:0.9rem;">Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
