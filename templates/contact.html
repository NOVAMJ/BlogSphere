{% extends 'base.html' %}
{% block content %}
<section class="contact-page">
  <header class="contact-page__header">
    <p class="contact-page__eyebrow">Contact</p>
    <h1 class="contact-page__title">Say hello.</h1>
    <p class="contact-page__lede">Story tip, partnership idea, bug report or just a kind word — we read everything.</p>
  </header>

  <form method="POST" action="{% url 'contact' %}" class="contact-form">
    {% csrf_token %}
    <div class="contact-form__row">
      <div class="contact-form__field">
        <label for="contact-name">Name</label>
        <input id="contact-name" name="name" type="text" required value="{{ form_data.name|default:'' }}" maxlength="100">
      </div>
      <div class="contact-form__field">
        <label for="contact-email">Email</label>
        <input id="contact-email" name="email" type="email" required value="{{ form_data.email|default:'' }}">
      </div>
    </div>
    <div class="contact-form__field">
      <label for="contact-subject">Subject <span class="muted">(optional)</span></label>
      <input id="contact-subject" name="subject" type="text" value="{{ form_data.subject|default:'' }}" maxlength="150">
    </div>
    <div class="contact-form__field">
      <label for="contact-message">Message</label>
      <textarea id="contact-message" name="message" rows="6" required maxlength="2000">{{ form_data.message|default:'' }}</textarea>
    </div>
    <button type="submit" class="contact-form__submit">Send message</button>
  </form>
</section>
{% endblock %}
