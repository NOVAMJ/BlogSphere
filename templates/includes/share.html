{% comment %}
Reusable social-share bar.
Usage:
    {% include "includes/share.html" with share_title=single_blog.title share_url=request.build_absolute_uri %}
{% endcomment %}
<div class="share-bar d-flex align-items-center flex-wrap" aria-label="Share this post">
    <span class="share-bar__label">Share</span>
    <a class="share-btn share-btn--twitter"
       href="https://twitter.com/intent/tweet?text={{ share_title|urlencode }}&url={{ share_url|urlencode }}"
       target="_blank" rel="noopener" title="Share on X / Twitter" aria-label="Share on X">
        <i class="fa fa-twitter" aria-hidden="true"></i>
    </a>
    <a class="share-btn share-btn--facebook"
       href="https://www.facebook.com/sharer/sharer.php?u={{ share_url|urlencode }}"
       target="_blank" rel="noopener" title="Share on Facebook" aria-label="Share on Facebook">
        <i class="fa fa-facebook" aria-hidden="true"></i>
    </a>
    <a class="share-btn share-btn--linkedin"
       href="https://www.linkedin.com/sharing/share-offsite/?url={{ share_url|urlencode }}"
       target="_blank" rel="noopener" title="Share on LinkedIn" aria-label="Share on LinkedIn">
        <i class="fa fa-linkedin" aria-hidden="true"></i>
    </a>
    <a class="share-btn share-btn--whatsapp"
       href="https://wa.me/?text={{ share_title|urlencode }}%20{{ share_url|urlencode }}"
       target="_blank" rel="noopener" title="Share on WhatsApp" aria-label="Share on WhatsApp">
        <i class="fa fa-whatsapp" aria-hidden="true"></i>
    </a>
    <button type="button"
            class="share-btn share-btn--copy"
            data-share-url="{{ share_url }}"
            title="Copy link"
            aria-label="Copy link to clipboard">
        <i class="fa fa-link" aria-hidden="true"></i>
        <span class="share-copied-label" aria-live="polite"></span>
    </button>
</div>
<script>
(function () {
    document.querySelectorAll('.share-btn--copy').forEach(function (btn) {
        btn.addEventListener('click', async function () {
            var url = btn.dataset.shareUrl;
            var label = btn.querySelector('.share-copied-label');
            try {
                await navigator.clipboard.writeText(url);
                if (label) { label.textContent = 'Copied!'; setTimeout(function(){ label.textContent=''; }, 1500); }
            } catch (e) {
                window.prompt('Copy this link:', url);
            }
        });
    });
})();
</script>
